<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tecno Book</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="cabecalho">
    <div class="container">
        <input type="checkbox" id="menu" class="container-botao">

        <label for="menu" class="container-rotulo">
            <span class="cabecalho_menu_hamburguer container-imagem"></span>
        </label>

        <ul class="lista-menu">
            <li class="lista-menu-titulo">
                <a href="#" id="lista-menu-titulo">Contato</a>
            </li>
            <li class="lista-menu-item">
                <a href="#" class="lista-menu-link">Programação</a>
            </li>
            <li class="lista-menu-item">
                <a href="#" class="lista-menu-link">Front-end</a>
            </li>
            <li class="lista-menu-item">
                <a href="#" class="lista-menu-link">Infraestrutura</a>
            </li>
            <li class="lista-menu-item">
                <a href="#" class="lista-menu-link">Business</a>
            </li>
            <li class="lista-menu-item">
                <a href="#" class="lista-menu-link">Design & UX</a>
            </li>
        </ul>
    </div>

    <img class="logo" src="img/Logo.svg" alt="Logo da Tecno Book">

    <div class="container">
        <a href="#">
            <img src="img/Favoritos.svg" alt="Meus Favoritos" class="container-imagem">
        </a>

        <a href="#">
            <img src="img/Compras.svg" alt="Carrinho" class="container-imagem">
        </a>

        <a href="#">
            <img src="img/Usuario.svg" alt="Meu Perfil" class="container-imagem">
        </a>
    </div>
</header>

<section class="banner">
    <h2 class="banner_titulo">Já sabe por onde começar?</h2>

    <p class="banner_texto">
        Encontre em nossa estante o que precisa para seu desenvolvimento!
    </p>

    <input
        type="search"
        class="banner_pesquisa"
        placeholder="Qual será sua próxima leitura?"
    >
</section>

<section class="carrossel">
    <h2 class="carrossel_titulo">Novos lançamentos</h2>

    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img src="../tecnobook/img/ApacheKafka.svg" alt="Apache Kafka">
            </div>

            <div class="swiper-slide">
                <img src="../tecnobook/img/Lideranc╠ºa.svg" alt="Liderança">
            </div>

            <div class="swiper-slide">
                <img src="../tecnobook/img/Javascript.svg" alt="JavaScript">
            </div>
        </div>

        <div class="swiper-pagination"></div>

        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>

        <div class="swiper-scrollbar"></div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>


<script src="script.js"></script>


</body>
</html>
